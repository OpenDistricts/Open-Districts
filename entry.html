<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenDistricts V4</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #000000;
            --white: #FFFFFF;
            --gray-dark: #1A1A1A;
            --gray-medium: #666666;
            --accent-red: #FF4500;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--black);
            overflow: hidden;
            font-family: 'Space Grotesk', monospace;
        }

        #container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Brutalist grid background */
        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                repeating-linear-gradient(0deg, transparent, transparent 99px, rgba(255, 255, 255, 0.05) 99px, rgba(255, 255, 255, 0.05) 100px),
                repeating-linear-gradient(90deg, transparent, transparent 99px, rgba(255, 255, 255, 0.05) 99px, rgba(255, 255, 255, 0.05) 100px);
            opacity: 0;
            animation: gridFade 0.8s ease-out 0.3s forwards;
        }

        @keyframes gridFade {
            to {
                opacity: 1;
            }
        }

        /* Main logo container - centered */
        .logo-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0;
        }

        /* OPEN DISTRICTS text */
        .main-text {
            position: relative;
        }

        .text-line {
            display: block;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 140px;
            letter-spacing: 0.05em;
            line-height: 0.85;
            color: var(--white);
            text-transform: uppercase;
            text-align: center;
            position: relative;
        }

        /* Heavy geometric blocks for each character */
        .char {
            display: inline-block;
            position: relative;
            opacity: 0;
            transform: translateY(0);
        }

        /* Brutalist assembly animation - hard snaps, no easing */
        @keyframes charAssemble {
            0% {
                opacity: 0;
                transform: translateY(100px) scaleY(0.5);
                filter: blur(10px);
            }

            40% {
                opacity: 0;
                transform: translateY(80px) scaleY(0.5);
            }

            60% {
                opacity: 1;
                transform: translateY(-10px) scaleY(1.1);
                filter: blur(0);
            }

            80% {
                transform: translateY(5px) scaleY(0.95);
            }

            100% {
                opacity: 1;
                transform: translateY(0) scaleY(1);
                filter: blur(0);
            }
        }

        /* Hard edge overlays for brutalist effect */
        .char::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.1) 0%, transparent 40%);
            opacity: 0;
            animation: edgeGlow 0.3s ease-out 2.5s forwards;
        }

        @keyframes edgeGlow {
            to {
                opacity: 1;
            }
        }

        /* Version container - brutalist solid block */
        .version-container {
            margin-top: 60px;
            position: relative;
            opacity: 0;
            transform: scaleX(0);
            animation: versionReveal 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 2.2s forwards;
        }

        @keyframes versionReveal {
            0% {
                opacity: 0;
                transform: scaleX(0);
            }

            100% {
                opacity: 1;
                transform: scaleX(1);
            }
        }

        .version-block {
            background: var(--white);
            color: var(--black);
            padding: 20px 80px;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 72px;
            letter-spacing: 0.2em;
            text-align: center;
            border: 4px solid var(--white);
            box-shadow:
                0 0 0 8px var(--black),
                0 0 0 12px var(--white);
            position: relative;
        }

        /* Corner accents - hard geometric */
        .corner-accent {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 3px solid var(--white);
        }

        .corner-accent.tl {
            top: -20px;
            left: -20px;
            border-right: none;
            border-bottom: none;
        }

        .corner-accent.tr {
            top: -20px;
            right: -20px;
            border-left: none;
            border-bottom: none;
        }

        .corner-accent.bl {
            bottom: -20px;
            left: -20px;
            border-right: none;
            border-top: none;
        }

        .corner-accent.br {
            bottom: -20px;
            right: -20px;
            border-left: none;
            border-top: none;
        }

        /* Geometric underline bars */
        .underline-bar {
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%) scaleX(0);
            width: 80%;
            height: 6px;
            background: var(--white);
            animation: barExpand 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 2s forwards;
        }

        @keyframes barExpand {
            to {
                transform: translateX(-50%) scaleX(1);
            }
        }

        /* Scan line effect - single pass */
        .scanline {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--white);
            opacity: 0.6;
            animation: scan 2s linear 0.5s 1;
            pointer-events: none;
        }

        @keyframes scan {
            0% {
                transform: translateY(0);
                opacity: 0.8;
            }

            100% {
                transform: translateY(100vh);
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <div id="container">
        <div class="grid-overlay"></div>
        <div class="scanline"></div>

        <div class="logo-container">
            <div class="main-text">
                <span class="text-line line1">
                    <span class="char"
                        style="animation: charAssemble 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s forwards;">O</span><span
                        class="char"
                        style="animation: charAssemble 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s forwards;">P</span><span
                        class="char"
                        style="animation: charAssemble 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s forwards;">E</span><span
                        class="char"
                        style="animation: charAssemble 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.4s forwards;">N</span>
                </span>
                <span class="text-line line2">
                    <span class="char"
                        style="animation: charAssemble 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.6s forwards;">D</span><span
                        class="char"
                        style="animation: charAssemble 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.7s forwards;">I</span><span
                        class="char"
                        style="animation: charAssemble 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.8s forwards;">S</span><span
                        class="char"
                        style="animation: charAssemble 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.9s forwards;">T</span><span
                        class="char"
                        style="animation: charAssemble 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 1.0s forwards;">R</span><span
                        class="char"
                        style="animation: charAssemble 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 1.1s forwards;">I</span><span
                        class="char"
                        style="animation: charAssemble 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 1.2s forwards;">C</span><span
                        class="char"
                        style="animation: charAssemble 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 1.3s forwards;">T</span><span
                        class="char"
                        style="animation: charAssemble 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 1.4s forwards;">S</span>
                </span>
                <div class="underline-bar"></div>
            </div>

            <div class="version-container">
                <div class="version-block">
                    V4
                    <div class="corner-accent tl"></div>
                    <div class="corner-accent tr"></div>
                    <div class="corner-accent bl"></div>
                    <div class="corner-accent br"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Minimal JS - brutalist approach favors CSS-only animations
        console.log('OpenDistricts V4 - Brutalist Assembly');

        // Optional: Add slight random offset to character positions for "manufactured" feel
        document.querySelectorAll('.char').forEach((char, index) => {
            const randomOffset = (Math.random() - 0.5) * 2;
            char.style.setProperty('transform', `translateY(${randomOffset}px)`);
        });
    </script>
</body>

</html>
