<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenDistricts V4</title>
    <meta name="description"
        content="OpenDistricts — Community health and civic intelligence kiosk. Left = Time. Center = Territory. Right = Intelligence.">

    <!-- Fonts: Syne (display) + DM Mono (data) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&family=Space+Grotesk:wght@700&display=swap"
        rel="stylesheet">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

    <!-- D3 for geospatial parsing in minimap -->
    <script src="https://d3js.org/d3.v7.min.js"></script>

    <!-- Turf.js for merging region polygons into a seamless district border -->
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

    <link rel="stylesheet" href="./css/v4.css">
    <link rel="stylesheet" href="./css/v4-splash.css">
</head>

<body>

    <!-- ═══════════════════════════════════════════════════════════════════════
       BRANDING SPLASH SCREEN — V4 UNINTERRUPTED ENTRY
  ═══════════════════════════════════════════════════════════════════════ -->
    <div id="splash-overlay">
        <div class="splash-grid-overlay"></div>
        <div class="splash-scanline"></div>

        <div class="splash-logo-container">
            <div class="splash-main-text">
                <span class="splash-text-line line1">
                    <span class="splash-char"
                        style="animation: splashCharAssemble 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s forwards;">O</span><span
                        class="splash-char"
                        style="animation: splashCharAssemble 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s forwards;">P</span><span
                        class="splash-char"
                        style="animation: splashCharAssemble 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s forwards;">E</span><span
                        class="splash-char"
                        style="animation: splashCharAssemble 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.4s forwards;">N</span>
                </span>
                <span class="splash-text-line line2">
                    <span class="splash-char"
                        style="animation: splashCharAssemble 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.6s forwards;">D</span><span
                        class="splash-char"
                        style="animation: splashCharAssemble 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.7s forwards;">I</span><span
                        class="splash-char"
                        style="animation: splashCharAssemble 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.8s forwards;">S</span><span
                        class="splash-char"
                        style="animation: splashCharAssemble 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.9s forwards;">T</span><span
                        class="splash-char"
                        style="animation: splashCharAssemble 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 1.0s forwards;">R</span><span
                        class="splash-char"
                        style="animation: splashCharAssemble 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 1.1s forwards;">I</span><span
                        class="splash-char"
                        style="animation: splashCharAssemble 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 1.2s forwards;">C</span><span
                        class="splash-char"
                        style="animation: splashCharAssemble 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 1.3s forwards;">T</span><span
                        class="splash-char"
                        style="animation: splashCharAssemble 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 1.4s forwards;">S</span>
                </span>
                <div class="splash-underline-bar"></div>
            </div>

            <div class="splash-version-container">
                <div class="splash-version-block">
                    V4
                    <div class="splash-corner-accent tl"></div>
                    <div class="splash-corner-accent tr"></div>
                    <div class="splash-corner-accent bl"></div>
                    <div class="splash-corner-accent br"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- ═══════════════════════════════════════════════════════════════════════
       TOP BAR — 44px, all system controls, fixed L→R order
  ═══════════════════════════════════════════════════════════════════════ -->
    <header id="topbar">

        <!-- 1. Logo -->
        <span id="tb-logo">OpenDistricts</span>

        <!-- 2. Separator -->
        <div class="tb-sep" aria-hidden="true"></div>

        <!-- 3. District label stack (read-only, not a selector trigger) -->
        <div id="tb-district-label">
            <div class="tb-district-meta" id="tb-district-meta">CURRENT DISTRICT</div>
            <div class="tb-district-name" id="tb-district-name">Khordha</div>
        </div>

        <!-- 4. Change Area button (ONLY trigger for hierarchy selector) -->
        <button id="tb-change-area" class="tb-btn" aria-label="Change district">CHANGE AREA</button>

        <!-- 5. Spacer -->
        <div class="tb-spacer" aria-hidden="true"></div>

        <!-- 6. Language selector -->
        <div id="tb-lang" role="group" aria-label="Language selector">
            <div class="lang-focus-ring"></div>
            <div class="lang-track" id="langTrack">
                <!-- Items injected by JS -->
            </div>
        </div>

        <!-- 7. Mode toggle: DISTRICT | LIVE -->
        <div id="tb-mode" role="group" aria-label="Map mode">
            <button class="mode-pill active" id="mode-district" data-mode="district">Basic</button>
            <button class="mode-pill" id="mode-live" data-mode="live">Advanced</button>
        </div>

        <!-- 8. Guided AI button -->
        <button id="tb-ai-btn" class="tb-btn primary" aria-label="Open Guided AI panel">AI Mode</button>

        <!-- 9. Sync dot -->
        <div id="sync-dot-wrap" aria-live="polite">
            <div id="sync-dot"></div>
            <span id="sync-label">LIVE</span>
        </div>

    </header>


    <!-- ═══════════════════════════════════════════════════════════════════════
       MAP CONTAINER — always 100vw, never resizes
  ═══════════════════════════════════════════════════════════════════════ -->
    <div id="map" class="district-view">

        <!-- Leaflet renders here -->

        <!-- Environmental overlays — Live Mode only, CSS-activated -->
        <div class="env-rain" aria-hidden="true"></div>
        <div class="env-haze" aria-hidden="true"></div>

        <!-- Custom zoom controls (standard Leaflet zoom disabled) -->
        <div id="map-zoom-controls" aria-label="Map zoom">
            <button id="zoom-in" class="zoom-btn" aria-label="Zoom in">+</button>
            <button id="zoom-out" class="zoom-btn" aria-label="Zoom out">−</button>
        </div>
        <!-- Map Settings Tray — Pulls up from the bottom temporal bar -->
        <div id="settings-tray-container">
            <!-- Pull-up tab -->
            <button id="settings-tab" class="tray-pull-tab" aria-label="Toggle map settings" aria-expanded="false">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path
                        d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                    </path>
                </svg>
            </button>

            <!-- Hidden Grid Panel -->
            <div id="settings-panel" class="hidden" aria-label="Map Settings grid">
                <div class="settings-grid">
                    <!-- Option 1: Lock Focus -->
                    <label class="setting-toggle-label">
                        <span class="setting-toggle-text" id="st-lock-focus-label">Lock Map Focus</span>
                        <input type="checkbox" id="lock-map-focus" checked />
                        <span class="setting-toggle-switch"></span>
                    </label>

                    <!-- Option 2: District Scope -->
                    <label class="setting-toggle-label">
                        <span class="setting-toggle-text" id="st-unlock-scope-label">Unlock District Scope</span>
                        <input type="checkbox" id="unlock-district-scope" />
                        <span class="setting-toggle-switch"></span>
                    </label>
                </div>
            </div>
        </div>

    </div>


    <!-- ═══════════════════════════════════════════════════════════════════════
       LEFT TIMELINE PANEL — overlay, opens at boot
  ═══════════════════════════════════════════════════════════════════════ -->
    <nav id="timeline-panel" aria-label="Weekly event timeline">

        <!-- Panel header -->
        <div id="tl-header">
            <div id="tl-header-labels">
                <div class="tl-header-meta" id="tl-header-meta">WEEKLY EVENTS</div>
                <div class="tl-header-district" id="tl-header-district">Khordha</div>
            </div>
        </div>

        <!-- Spine scroll area -->
        <div id="tl-scroll" role="list" aria-label="Events list">
            <div class="tl-spine" id="tl-spine">
                <!-- Timeline cards injected by v4-app.js -->
            </div>
        </div>

    </nav>

    <!-- Side toggle tab — decoupled from panel to prevent any clipping -->
    <button id="tl-tab" class="panel-side-tab" aria-label="Toggle timeline" aria-expanded="true">
        <span id="tl-tab-chevron">‹</span>
    </button>

    <!-- ═══════════════════════════════════════════════════════════════════════
       RIGHT AI PANEL — overlay, closed at boot
  ═══════════════════════════════════════════════════════════════════════ -->
    <aside id="ai-panel" aria-label="Guided Intelligence panel">

        <!-- Panel header -->
        <div id="ai-header">
            <div id="ai-header-left">
                <div id="ai-active-dot" aria-hidden="true"></div>
                <span id="ai-header-title">AI Mode</span>
            </div>
            <button id="ai-close-btn" class="ai-close-btn" aria-label="Close AI panel">&#10005;</button>
        </div>

        <!-- Context bar — changes based on general vs event-bound mode -->
        <div id="ai-context-bar">
            <span id="ai-context-text"></span>
            <div id="ai-context-mode-badge" class="ai-context-badge general">DISTRICT CONTEXT</div>
        </div>

        <!-- Intent section — scrollable -->
        <div id="ai-intent-section">
            <div class="ai-section-label" id="ai-section-label">SELECT A QUERY</div>

            <!-- General district intents -->
            <div class="ai-intents" id="ai-intents-general">
                <button class="intent-card" data-intent="disease-history">
                    <div class="intent-title">Disease History</div>
                    <div class="intent-sub">Historical spread and severity trends for this district</div>
                </button>
                <button class="intent-card" data-intent="nearest-facility">
                    <div class="intent-title">Nearest Health Facility</div>
                    <div class="intent-sub">Find operational PHCs within 10km</div>
                </button>
                <button class="intent-card" data-intent="water-status">
                    <div class="intent-title">Water Point Status</div>
                    <div class="intent-sub">Active borewells and supply coverage today</div>
                </button>
                <button class="intent-card" data-intent="safe-travel">
                    <div class="intent-title">Safe Travel Routes</div>
                    <div class="intent-sub">Road conditions and mobility advisories</div>
                </button>
            </div>

            <!-- Event-bound intents (hidden unless context = event-bound) -->
            <div class="ai-intents hidden" id="ai-intents-event">
                <button class="intent-card" data-intent="spreading">
                    <div class="intent-title">Is This Spreading?</div>
                    <div class="intent-sub">7-day case trajectory for this event</div>
                </button>
                <button class="intent-card" data-intent="nearest-facility">
                    <div class="intent-title">Nearest Health Facility</div>
                    <div class="intent-sub">Find operational PHCs within 10km</div>
                </button>
                <button class="intent-card" data-intent="historical-compare">
                    <div class="intent-title">Historical Comparison</div>
                    <div class="intent-sub">Same event type, same region — past 3 years</div>
                </button>
            </div>
        </div>

        <!-- Result area (hidden until intent is selected) -->
        <div id="ai-result" class="hidden" role="region" aria-label="AI response">
            <div id="ai-result-source">
                <span class="result-verified-dot" aria-hidden="true"></span>
                <span id="ai-result-source-text"></span>
            </div>
            <div id="ai-result-body"></div>
        </div>

    </aside>

    <!-- Side toggle tab — decoupled from AI panel -->
    <button id="ai-tab" class="panel-side-tab ai" aria-label="Toggle AI panel" aria-expanded="false">
        <span id="ai-tab-chevron">›</span>
    </button>


    <!-- ═══════════════════════════════════════════════════════════════════════
       TIME AXIS — 60px, always visible
  ═══════════════════════════════════════════════════════════════════════ -->
    <div id="time-axis" role="region" aria-label="Temporal timeline">

        <!-- Left controls: play / fast-forward -->
        <div id="ta-controls">
            <button id="ta-play" class="ta-ctrl-btn" aria-label="Play through time">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor" stroke="none">
                    <path d="M5 3l14 9-14 9V3z" />
                </svg>
            </button>
            <button id="ta-stop" class="ta-ctrl-btn" aria-label="Stop playback and reset to live">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor" stroke="none">
                    <path d="M6 6h12v12H6z" />
                </svg>
            </button>
            <button id="ta-ff" class="ta-ctrl-btn" aria-label="Fast forward">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor" stroke="none">
                    <path d="M3 4l9 8-9 8V4zm9 0l9 8-9 8V4z" />
                </svg>
            </button>
        </div>

        <!-- Main timeline area: ruler + density ribbon + playhead -->
        <div id="ta-main">
            <!-- Ruler layer (28px) — rendered by JS canvas-free approach with divs -->
            <div id="ta-ruler" aria-hidden="true"></div>

            <!-- Density ribbon (32px) — coloured segments rendered by JS -->
            <div id="ta-ribbon" role="presentation"></div>

            <!-- Playhead: 2px white line + draggable handle -->
            <div id="ta-playhead" aria-label="Temporal position" role="slider" tabindex="0" aria-valuemin="0"
                aria-valuemax="100" aria-valuenow="100">
                <div id="ta-playhead-line" aria-hidden="true"></div>
                <div id="ta-playhead-handle" aria-hidden="true"></div>
            </div>
        </div>



    </div>


    <!-- ═══════════════════════════════════════════════════════════════════════
       HIERARCHY SELECTOR — full-screen overlay, z-index takeover
  ═══════════════════════════════════════════════════════════════════════ -->
    <div id="hierarchy-selector" class="hidden" role="dialog" aria-modal="true" aria-label="Select district">

        <div id="hs-inner">

            <!-- Tier 1: State map and search -->
            <div id="hs-tier1">
                <div id="hs-header">
                    <h2 id="hs-title" class="hs-tier1-title">Select Your State</h2>
                    <button id="hs-close" class="hs-close-btn" aria-label="Close district selector">&#10005;</button>
                </div>

                <div id="hs-tier1-body">
                    <!-- Left: India Minimap SVG Container -->
                    <div id="hs-india-map">
                        <svg id="hs-india-svg" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
                            <!-- Paths injected by JS -->
                        </svg>
                        <!-- In-map popup: Search and Stats -->
                        <div id="hs-right-panel" role="dialog" aria-label="State details">
                            <div id="hs-popup-head">
                                <span id="hs-popup-title">State Selector</span>
                                <button id="hs-panel-close" class="hs-popup-close-btn" aria-label="Collapse popup">&#10005;</button>
                            </div>
                            <div id="hs-search-wrap">
                                <input type="text" id="hs-search" placeholder="Search state..." autocomplete="off"
                                    aria-label="Search state">
                            </div>

                            <!-- Stats Bar (Hidden until state selected) -->
                            <div id="hs-state-stats-bar" class="hidden" role="region" aria-label="State Stats">
                                <h3 id="hs-state-stats-name"></h3>
                                <div class="hs-stat-row">
                                    <span id="hs-state-pop-label">Population</span>
                                    <strong id="hs-state-stats-pop">-</strong>
                                </div>
                                <div class="hs-stat-row">
                                    <span id="hs-state-points-label">Data Points</span>
                                    <strong id="hs-state-stats-alerts" class="danger-text">-</strong>
                                </div>
                                <div id="hs-state-stats-action">Double-click map to enter</div>
                            </div>
                        </div>
                        <button id="hs-panel-open" class="hs-popup-open-btn" aria-label="Show state popup">State Panel</button>
                    </div>
                </div>
            </div>

            <!-- Tier 2: District map (hidden until state selected) -->
            <div id="hs-tier2" class="hidden">
                <div id="hs-t2-header">
                    <button id="hs-back" class="hs-back-btn" aria-label="Back to states">&#8592;</button>
                    <span id="hs-t2-state-name"></span>
                    <button id="hs-t2-close" class="hs-close-btn" aria-label="Close">&#10005;</button>
                </div>
                <div id="hs-t2-search-wrap">
                    <input type="text" id="hs-t2-search" placeholder="Search district..." autocomplete="off"
                        aria-label="Search district">
                </div>
                <div id="hs-t2-body">
                    <!-- Central: SVG district map -->
                    <div id="hs-district-map-wrap">
                        <svg id="hs-district-svg" viewBox="0 0 400 380" xmlns="http://www.w3.org/2000/svg">
                            <!-- District polygons injected by JS -->
                        </svg>
                    </div>
                    <!-- Right: Sliding stats bar -->
                    <div id="hs-district-stats" role="region" aria-label="District Stats">
                        <div id="hs-stats-content">
                            <h3 id="hs-stats-name"></h3>
                            <div id="hs-stats-data">
                                <div class="hs-stat-row">
                                    <span id="hs-dist-pop-label">Population</span>
                                    <strong id="hs-stats-pop">-</strong>
                                </div>
                                <div class="hs-stat-row">
                                    <span id="hs-dist-points-label">Data Points</span>
                                    <strong id="hs-stats-alerts" class="danger-text">-</strong>
                                </div>
                            </div>
                            <div id="hs-stats-action"></div>
                        </div>
                    </div>
                </div>
            </div>

        </div>

    </div>


    <!-- App entry point -->
    <script type="module" src="./js/v4-app.js"></script>

</body>

</html>
